<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test vocacional DASC</title>
    <meta
      name="description"
      content="Descubre qué carrera y modalidad van contigo con el test vocacional de DASC."
    />
    <script>
      document.documentElement.classList.add("has-js");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <div class="splash-screen" data-splash-screen>
      <div class="splash-screen__panel">
        <img
          class="splash-screen__logo"
          src="logo-dasc-azul.png"
          alt="DASC"
          width="1024"
          height="248"
        />
        <p class="splash-screen__eyebrow">Test vocacional</p>
        <h1 class="splash-screen__title">Descubre tu mejor opción</h1>
        <p class="splash-screen__copy">
          Responde el test y conoce la carrera y modalidad que mejor van contigo.
        </p>
        <button class="button button--primary" type="button" data-start-quiz>
          Comenzar
        </button>
      </div>
    </div>

    <main class="app-shell" id="top">
      <section class="quiz-page">
        <div class="quiz-page__inner">
          <div class="quiz-app quiz-app--solo" data-quiz-app>
            <div class="quiz-stage" data-quiz-stage aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
